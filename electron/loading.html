<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D2B55;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px}
.logo{font-size:28px;font-weight:700}.logo span{color:#C9A02B}
.sub{font-size:13px;color:rgba(255,255,255,0.5)}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,0.15);border-top-color:#C9A02B;border-radius:50%;animation:s .8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.status{font-size:12px;color:rgba(255,255,255,0.35)}
</style></head><body>
<div class="logo">Sol<span>Quoter</span></div>
<div class="sub">Solicitation Quote Generator</div>
<div class="spin"></div>
<div class="status">Starting backend...</div>
</body></html>
