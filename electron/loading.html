<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D1117;color:#C9D1D9;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px}
.logo{font-size:28px;font-weight:700}.logo span{color:#C9D1D9}
.sub{font-size:13px;color:#8B949E}
.spin{width:36px;height:36px;border:3px solid #30363D;border-top-color:#C9D1D9;border-radius:50%;animation:s .8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.status{font-size:12px;color:#8B949E}
</style></head><body>
<div class="logo">Sol<span>Quoter</span></div>
<div class="sub">Solicitation Quote Generator</div>
<div class="spin"></div>
<div class="status">Starting backend...</div>
</body></html>
